<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Good - Cheap - Fast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="row">
        <label class="switch">
            <input type="checkbox" id="good" onchange="ktGood()">
            <span class="slider"></span>
        </label>
        <span class="label-text">GOOD</span>
    </div>

    <div class="row">
        <label class="switch">
            <input type="checkbox" id="cheap" onchange="ktCheap()">
            <span class="slider"></span>
        </label>
        <span class="label-text">CHEAP</span>
    </div>

    <div class="row">
        <label class="switch">
            <input type="checkbox" id="fast" onchange="ktFast()">
            <span class="slider"></span>
        </label>
        <span class="label-text">FAST</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
